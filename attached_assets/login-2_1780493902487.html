<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitSpace - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      background: #0b0f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
      padding: 20px;
      cursor: pointer;
    }
    .container {
      width: 400px;
      background: #151b2d;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      cursor: default;
    }
    h1 { text-align: center; margin-bottom: 30px; color: #6d5dfc; }
    .input-box { margin-bottom: 20px; }
    .input-box label { display: block; margin-bottom: 8px; }
    .input-box input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #0b0f1a;
      color: white;
      outline: none;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #6d5dfc;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn:hover { background: #5847ff; }
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0 18px;
      color: #9ea7c2;
      font-size: 14px;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }
    .social-login {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .social-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0f1424;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }
    .social-btn:hover {
      transform: translateY(-2px);
      background: #171e33;
      border-color: rgba(109,93,252,0.45);
    }
    .social-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .apple-btn { background: #ffffff; color: #111111; }
    .apple-btn:hover { background: #f1f1f1; border-color: rgba(255,255,255,0.65); }
    .bottom { margin-top: 22px; text-align: center; }
    .bottom a { color: #6d5dfc; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login</h1>
    <form id="loginForm">
      <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Inserisci la tua email" />
      </div>
      <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Inserisci la password" />
      </div>
      <button class="btn" type="submit">Accedi</button>
    </form>

    <div class="divider">oppure continua con</div>

    <div class="social-login">
      <button class="social-btn google-btn" type="button" aria-label="Accedi con Google">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#EA4335" d="M12 10.2v3.9h5.4c-.24 1.26-.96 2.32-2.04 3.03l3.3 2.56c1.92-1.77 3.03-4.38 3.03-7.48 0-.71-.06-1.39-.18-2.04H12z"/>
          <path fill="#34A853" d="M12 22c2.7 0 4.97-.9 6.63-2.44l-3.3-2.56c-.92.62-2.1.99-3.33.99-2.56 0-4.73-1.73-5.5-4.05H3.08v2.64A9.997 9.997 0 0 0 12 22z"/>
          <path fill="#4A90E2" d="M6.5 13.94A5.99 5.99 0 0 1 6.19 12c0-.67.12-1.31.31-1.94V7.42H3.08A10 10 0 0 0 2 12c0 1.61.39 3.14 1.08 4.58l3.42-2.64z"/>
          <path fill="#FBBC05" d="M12 5.98c1.47 0 2.8.51 3.84 1.51l2.88-2.88C16.96 2.98 14.7 2 12 2A9.997 9.997 0 0 0 3.08 7.42L6.5 10.06c.77-2.32 2.94-4.08 5.5-4.08z"/>
        </svg>
        <span>Accedi con Google</span>
      </button>

      <button class="social-btn apple-btn" type="button" aria-label="Accedi con Apple">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M16.37 12.27c.03 3.05 2.68 4.06 2.71 4.07-.02.07-.42 1.44-1.38 2.84-.83 1.2-1.69 2.4-3.05 2.42-1.34.03-1.77-.8-3.3-.8-1.54 0-2.01.78-3.28.83-1.31.05-2.31-1.31-3.15-2.5-1.71-2.48-3.01-7.01-1.26-10.05.87-1.51 2.43-2.47 4.12-2.49 1.29-.02 2.51.87 3.3.87.79 0 2.28-1.07 3.84-.91.65.03 2.48.26 3.65 1.97-.09.06-2.18 1.27-2.2 3.75zM14.96 4.93c.7-.85 1.18-2.03 1.05-3.21-1.01.04-2.23.67-2.96 1.52-.65.75-1.22 1.95-1.07 3.1 1.12.09 2.28-.57 2.98-1.41z"/>
        </svg>
        <span>Accedi con Apple</span>
      </button>
    </div>

    <div class="bottom">
      Non hai un account? <a href="register-3.html">Registrati</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (event) {
      event.preventDefault();
      window.location.href = 'artist-feed.html';
    });

    document.querySelector('.google-btn').addEventListener('click', function () {
      window.location.href = 'artist-feed.html';
    });

    document.querySelector('.apple-btn').addEventListener('click', function () {
      window.location.href = 'artist-dashboard.html';
    });

    document.body.addEventListener('click', function (event) {
      if (!event.target.closest('.container')) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
