<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitSpace - Registrazione</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      background: #0b0f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
      padding: 20px;
      cursor: pointer;
    }
    .container {
      width: 560px;
      max-width: 100%;
      background: #151b2d;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      cursor: default;
    }
    h1 { text-align: center; margin-bottom: 30px; color: #6d5dfc; }
    .input-box { margin-bottom: 20px; }
    .input-box label,
    .genre-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .input-box input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #0b0f1a;
      color: white;
      outline: none;
    }
    .genre-section {
      margin: 26px 0 24px;
    }
    .genre-note {
      color: #9ea7c2;
      font-size: 14px;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .genre-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .genre-option {
      position: relative;
    }
    .genre-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .genre-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #0f1424;
      border: 1px solid rgba(255,255,255,0.08);
      color: #dce1f3;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
      transition: 0.25s ease;
    }
    .genre-option label:hover {
      border-color: rgba(109,93,252,0.45);
      transform: translateY(-2px);
    }
    .genre-option input:checked + label {
      background: rgba(109,93,252,0.18);
      border-color: #6d5dfc;
      color: white;
      box-shadow: 0 0 0 1px rgba(109,93,252,0.25);
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #6d5dfc;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 600;
    }
    .btn:hover { background: #5847ff; }
    .bottom { margin-top: 20px; text-align: center; }
    .bottom a { color: #6d5dfc; text-decoration: none; }

    @media (max-width: 640px) {
      .container { padding: 28px 20px; }
      .genre-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Registrati</h1>
    <form>
      <div class="input-box">
        <label>Nome Utente</label>
        <input type="text" placeholder="Scegli un username" />
      </div>
      <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Inserisci la tua email" />
      </div>
      <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Crea una password" />
      </div>
      <div class="input-box">
        <label>Conferma Password</label>
        <input type="password" placeholder="Conferma la password" />
      </div>

      <div class="genre-section">
        <span class="genre-label">Scegli i tuoi generi musicali preferiti</span>
        <p class="genre-note">Puoi selezionare uno o più generi tra 15 dei più diffusi a livello globale.</p>
        <div class="genre-grid">
          <div class="genre-option"><input type="checkbox" id="pop" name="genres" value="Pop"><label for="pop">Pop</label></div>
          <div class="genre-option"><input type="checkbox" id="hiphop" name="genres" value="Hip-Hop/Rap"><label for="hiphop">Hip-Hop / Rap</label></div>
          <div class="genre-option"><input type="checkbox" id="rock" name="genres" value="Rock"><label for="rock">Rock</label></div>
          <div class="genre-option"><input type="checkbox" id="edm" name="genres" value="EDM"><label for="edm">EDM</label></div>
          <div class="genre-option"><input type="checkbox" id="latin" name="genres" value="Latin"><label for="latin">Latin</label></div>
          <div class="genre-option"><input type="checkbox" id="country" name="genres" value="Country"><label for="country">Country</label></div>
          <div class="genre-option"><input type="checkbox" id="kpop" name="genres" value="K-Pop"><label for="kpop">K-Pop</label></div>
          <div class="genre-option"><input type="checkbox" id="rnb" name="genres" value="R&B/Soul"><label for="rnb">R&B / Soul</label></div>
          <div class="genre-option"><input type="checkbox" id="jazz" name="genres" value="Jazz"><label for="jazz">Jazz</label></div>
          <div class="genre-option"><input type="checkbox" id="classical" name="genres" value="Classical"><label for="classical">Classica</label></div>
          <div class="genre-option"><input type="checkbox" id="afrobeats" name="genres" value="Afrobeats"><label for="afrobeats">Afrobeats</label></div>
          <div class="genre-option"><input type="checkbox" id="indie" name="genres" value="Indie/Alternative"><label for="indie">Indie / Alternative</label></div>
          <div class="genre-option"><input type="checkbox" id="reggaeton" name="genres" value="Reggaeton"><label for="reggaeton">Reggaeton</label></div>
          <div class="genre-option"><input type="checkbox" id="trap" name="genres" value="Trap"><label for="trap">Trap</label></div>
          <div class="genre-option"><input type="checkbox" id="phonk" name="genres" value="Phonk"><label for="phonk">Phonk</label></div>
        </div>
      </div>

      <button class="btn" type="button">Crea Account</button>
    </form>
    <div class="bottom">
      Hai già un account? <a href="login-2.html">Login</a>
    </div>
  </div>

  <script>
    document.body.addEventListener('click', function (event) {
      if (!event.target.closest('.container')) {
        window.location.href = 'index.html';
      }
    });
  </script>

</body>
</html>
